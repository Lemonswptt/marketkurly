<!DOCTYPE html>
<html lang="ko">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>마켓컬리 클론</title>
      <script src="script/jquery-1.12.3.js"></script>
      <script src="script/script.js"></script>
      <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>

      <header>
        <!-- 1행 -->
        <div class="header-top">
          <span>회원가입</span>
          <span>로그인</span>
          <span>고객센터</span>
        </div>

        <!-- 2행 -->
        <div class="header-middle">
            <div class="header-left">
                <div class="logo">
                    <img src="https://res.kurly.com/images/marketkurly/logo/logo_x2.png" alt="마켓컬리 로고">
                </div>
                <div class="menu">
                    <span class="active">마켓컬리</span>
                    <span>뷰티컬리</span>
                </div>
            </div>
          

          

          <div class="search">
            <input type="text" placeholder="검색어를 입력해주세요">
            🔍
          </div>

          <div class="icons">
            📍
            ❤️
            🛒
          </div>
        </div>

        <!-- 3행 -->
        <div class="header-bottom">
          <div class="category">
            <span class="hamburger">☰</span>
            <span>카테고리</span>
          </div>

          <div class="nav-links">
            <span>신상품</span>
            <span>베스트</span>
            <span>알뜰쇼핑</span>
            <span>특가/혜택</span>
          </div>

          <div class="delivery-info">
            <button>샛별·하루<p> 배송안내</p></button>
          </div>
        </div>
      </header>
      <div id="slider">
        <ul class="slider-wrap">
            <li class="slider"><a href="#"><img src="" alt=""></a></li>
            <li class="slider"><a href="#"><img src="" alt=""></a></li>
            <li class="slider"><a href="#"><img src="" alt=""></a></li>
        </ul>
      </div>
    </body>
</html>
